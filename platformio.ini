[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:esp_uav]
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_src_filter = +<uav/esp_uav.cpp>

[env:esp_ugv]
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1
build_src_filter = +<ugv/esp_ugv.cpp>
